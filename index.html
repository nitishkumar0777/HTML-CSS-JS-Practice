<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friends by Joatmon</title>
    <style type="text/css">
        body{
            background-color: rgb(255, 255, 255);
            /* background-image: url("friends.webp"); */
            background-position: 300px 10px;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }
        p{
            color: rgb(2, 85, 12);
            text-align: justify;
        } 
        a:link{
            color: red;
        }  
        a:hover{
            color: green;
        }
        a:active{
            color: blue;
        }
        a:visited{
            color: orange;
        }
        .relpos{
            position: relative;
            top: 100px;
            left: 100px;
        }

        /* Types of selector
        element, class, id, decendent, child selector e.g body > p */
    </style>
</head>
<body>
    <p><a href="https://github.com/nitishkumar0777/">My github portfolio.</a></p>

<p class="relpos">Hello World</p>
<p>Hello World 2</p>
</body>
</html>
